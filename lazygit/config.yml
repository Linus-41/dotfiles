os:
  edit: '$HOME/scripts/lazygit_smart_open.zsh {{filename}}'
  editAtLine: '$HOME/scripts/lazygit_smart_open.zsh {{filename}} {{line}}'
  open: '$HOME/scripts/lazygit_smart_open.zsh {{filename}}'

customCommands:
  - key: '<c-g>'
    context: global
    description: Generate AI commit message from staged changes
    command: '$HOME/scripts/lazygit_generate_commit_message.zsh'
    output: popup
    loadingText: Generating commit message with Ollama...
